services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: study_chinese
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d study_chinese"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/study_chinese
      JWT_SECRET: local-dev-secret-change-before-production-123456
      AI_PROVIDER: mock
      OCR_PROVIDER: mock
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_GATEWAY_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres_data:
