services:
  server:
    container_name: study-chinese-server
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      API_BASE_URL: http://localhost:5173/api/v1
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/v1/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  client:
    container_name: study-chinese-client
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
